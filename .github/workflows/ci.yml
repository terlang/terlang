name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Check
        run: make check

      - name: Test
        run: make test
