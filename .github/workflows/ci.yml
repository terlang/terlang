name: Compiler CI

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "std/**"
      - "tests/**"
      - "docs/grammar/**"
      - "tools/**"
      - "Makefile"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "std/**"
      - "tests/**"
      - "docs/grammar/**"
      - "tools/**"
      - "Makefile"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  check:
    name: Compiler check and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Check
        run: make check

      - name: Test
        run: make test
